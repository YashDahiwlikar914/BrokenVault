<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Vault - Notes</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
</head>

<body class="min-h-screen p-8">
    <div class="absolute top-4 right-4 flex items-center gap-2">
        <div id="modeBadge" class="badge badge-error">Vulnerable Mode</div>
        <button id="modeToggleButton" class="btn btn-xs btn-outline" onclick="toggleMode()">Enable Secure Mode</button>
    </div>

    <h1 class="text-3xl font-bold mb-6 text-center">My Notes</h1>

    <!-- Stats + Search Row -->
    <div class="flex justify-between items-center mb-6">
        <!-- Stats Bar -->
        <div class="stats shadow">
            <div class="stat">
                <div class="stat-title">SQL Injections</div>
                <div class="stat-value text-error" id="injectionCount">0</div>
            </div>

            <div class="stat">
                <div class="stat-title">XSS Attacks</div>
                <div class="stat-value text-warning" id="xssCount">0</div>
            </div>

            <div class="stat">
                <div class="stat-title">Login Bypasses</div>
                <div class="stat-value text-info" id="bypassCount">0</div>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="flex items-center justify-center gap-2">
            <input type="text" id="searchInput" class="input input-bordered w-72" placeholder="Search notes...">
            <button class="btn btn-neutral ml-2" onclick="searchNotes()">Search</button>
        </div>
    </div>

    <div class="grid gap-4 mb-6 lg:grid-cols-2">
        <div class="card bg-base-200 shadow-sm">
            <div class="card-body">
                <div class="flex items-center justify-between gap-4">
                    <h2 class="card-title">Exploit Console</h2>
                    <span class="text-xs opacity-70">Click a chip to fill the demo inputs.</span>
                </div>

                <div class="flex flex-wrap gap-2">
                    <button class="btn btn-sm btn-error btn-outline" onclick="applyPayload('unionSearch')">UNION Search</button>
                    <button class="btn btn-sm btn-warning btn-outline" onclick="applyPayload('tautologySearch')">Tautology Search</button>
                    <button class="btn btn-sm btn-info btn-outline" onclick="applyPayload('storedXss')">Stored XSS Note</button>
                </div>

                <p id="payloadStatus" class="text-sm opacity-75">Choose a payload to auto-fill the search bar or note form.</p>
            </div>
        </div>

        <div class="card bg-base-200 shadow-sm">
            <div class="card-body">
                <div class="flex items-center justify-between gap-4">
                    <h2 class="card-title">Last Query</h2>
                    <button class="btn btn-xs btn-ghost" onclick="refreshObservability()">Refresh</button>
                </div>
                <pre id="lastQueryPanel" class="bg-neutral text-neutral-content rounded-box p-4 text-xs whitespace-pre-wrap break-words min-h-32">No tracked queries yet.</pre>
            </div>
        </div>
    </div>

    <!-- Notes Table -->
    <div class="overflow-x-auto">
        <table class="table table-zebra">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Content</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="notesTable">
                <!-- Notes will be populated here by JavaScript -->
            </tbody>
        </table>
    </div>
    <!-- New Note Form -->
    <div class="flex justify-center mt-6">
        <div class="card bg-base-200 p-6 w-full max-w-xl">
            <h2 class="card-title mb-4">Create New Note</h2>

            <label class="label">Title</label>
            <input type="text" id="noteTitle" class="input input-bordered w-full" placeholder="Note title">

            <label class="label mt-4">Content</label>
            <textarea id="noteContent" class="textarea textarea-bordered w-full h-48"
                placeholder="Note content"></textarea>

            <button class="btn btn-neutral mt-4" onclick="createNote()">Create Note</button>
        </div>
    </div>

</body>

<script>
    const userId = sessionStorage.getItem('userId');
    let currentConfig = { secureMode: false, mode: 'vulnerable' };
    const payloads = {
        unionSearch: {
            description: 'Filled the search box with a UNION payload for credential extraction.',
            search: `' UNION SELECT username, password, 1 FROM users --`
        },
        tautologySearch: {
            description: 'Filled the search box with a tautology payload to demonstrate broad matching.',
            search: `' OR '1'='1' --`
        },
        storedXss: {
            description: 'Filled the note form with a stored XSS payload.',
            title: 'Vault breach demo',
            content: `<svg onload=alert(1)>`
        }
    };

    window.onload = async function () {
        if (!userId) {
            window.location.href = 'login.html';
            return;
        }
        await loadConfig();
        await loadNotes();
        await refreshObservability();
    };

    async function loadConfig() {
        const res = await fetch('/config');
        currentConfig = await res.json();
        applyMode(currentConfig);
    }

    function applyMode(config) {
        const badge = document.getElementById('modeBadge');
        const button = document.getElementById('modeToggleButton');
        const payloadStatus = document.getElementById('payloadStatus');

        badge.textContent = config.secureMode ? 'Secure Mode' : 'Vulnerable Mode';
        badge.className = config.secureMode ? 'badge badge-success' : 'badge badge-error';
        button.textContent = config.secureMode ? 'Enable Vulnerable Mode' : 'Enable Secure Mode';
        payloadStatus.textContent = config.secureMode
            ? 'Secure mode is active. Payload chips still fill the fields so you can verify that attacks no longer execute.'
            : 'Choose a payload to auto-fill the search bar or note form.';
    }

    async function toggleMode() {
        const res = await fetch('/toggle-mode', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                secureMode: !currentConfig.secureMode
            })
        });

        currentConfig = await res.json();
        applyMode(currentConfig);
        await loadNotes();
        await refreshObservability();
    }

    async function loadNotes() {
        const res = await fetch(`/notes?userId=${userId}`);
        const notes = await res.json();
        renderNotes(notes);
    };

    function renderNotes(notes) {
        const tbody = document.getElementById('notesTable');
        tbody.innerHTML = '';

        if (currentConfig.secureMode) {
            notes.forEach(note => {
                const row = document.createElement('tr');
                const idCell = document.createElement('td');
                const titleCell = document.createElement('td');
                const contentCell = document.createElement('td');
                const actionCell = document.createElement('td');
                const deleteButton = document.createElement('button');

                idCell.textContent = note.id;
                titleCell.textContent = note.title;
                contentCell.textContent = note.content;

                deleteButton.className = 'btn btn-error btn-soft';
                deleteButton.textContent = 'Delete';
                deleteButton.addEventListener('click', () => deleteNote(note.id));
                actionCell.appendChild(deleteButton);

                row.appendChild(idCell);
                row.appendChild(titleCell);
                row.appendChild(contentCell);
                row.appendChild(actionCell);
                tbody.appendChild(row);
            });
            return;
        }

        notes.forEach(note => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${note.id}</td>
                <td>${note.title}</td>
                <td>${note.content}</td>
                <td><button class="btn btn-error btn-soft" onclick="deleteNote(${note.id})">Delete</button></td>
            `;
            tbody.appendChild(row);
        });
    }

    function applyPayload(key) {
        const payload = payloads[key];
        if (!payload) return;

        if (payload.search) {
            document.getElementById('searchInput').value = payload.search;
        }

        if (payload.title) {
            document.getElementById('noteTitle').value = payload.title;
        }

        if (payload.content) {
            document.getElementById('noteContent').value = payload.content;
        }

        document.getElementById('payloadStatus').textContent = payload.description;
    }

    async function refreshObservability() {
        await Promise.all([loadStats(), loadLastQuery()]);
    }

    async function loadStats() {
        const res = await fetch('/stats');
        const stats = await res.json();

        document.getElementById('injectionCount').textContent = stats.sqlInjectionCount ?? 0;
        document.getElementById('xssCount').textContent = stats.xssCount ?? 0;
        document.getElementById('bypassCount').textContent = stats.loginBypassCount ?? 0;

        if (stats.mode) {
            currentConfig = { ...currentConfig, mode: stats.mode, secureMode: stats.mode === 'secure' };
            applyMode(currentConfig);
        }
    }

    async function loadLastQuery() {
        const res = await fetch('/last-query');
        const data = await res.json();
        document.getElementById('lastQueryPanel').textContent = data.query || 'No tracked queries yet.';
    }

    async function searchNotes() {
        const q = document.getElementById('searchInput').value;
        const res = await fetch(`/notes/search?userId=${userId}&q=${q}`);
        const notes = await res.json();
        renderNotes(notes);
        await refreshObservability();
    }

    async function createNote() {
        const title = document.getElementById('noteTitle').value;
        const content = document.getElementById('noteContent').value;

        if (!title || !content) {
            alert('Please fill in all fields');
            return;
        }

        const res = await fetch('/notes', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ userId: parseInt(userId), title, content })
        });

        if (!res.ok) {
            const errorText = await res.text();
            alert(`Failed to create note: ${errorText || res.status}`);
            return;
        }

        document.getElementById('noteTitle').value = '';
        document.getElementById('noteContent').value = '';
        
        await loadNotes();
        await refreshObservability();
    }

    async function deleteNote(noteId) {
        if (!confirm('Are you sure you want to delete this note?')) return;
        
        await fetch(`/notes/${noteId}`, {
            method: 'DELETE'
        });
        
        await loadNotes();
        await refreshObservability();
    }
</script>

</html>
