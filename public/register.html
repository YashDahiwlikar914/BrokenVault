<!DOCTYPE html>
<html lang="en" data-theme="forest">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Vault - Register</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
</head>

<body class="min-h-screen flex items-center justify-center">
    <div class="absolute top-4 right-4 flex items-center gap-2">
        <div id="modeBadge" class="badge badge-error">Vulnerable Mode</div>
        <button id="modeToggleButton" class="btn btn-xs btn-outline" onclick="toggleMode()">Enable Secure Mode</button>
    </div>

    <div class="flex flex-col gap-4 w-full max-w-md px-4">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box border p-4">
            <legend class="fieldset-legend">Secure Registration</legend>

            <p id="registerHelpText" class="text-sm opacity-75">Switch to secure mode to create a new account.</p>

            <label class="label">Username</label>
            <input type="text" id="registerUsername" class="input" placeholder="New username" />

            <label class="label">Password</label>
            <input type="password" id="registerPassword" class="input" placeholder="New password" />

            <button id="registerButton" class="btn btn-primary mt-4" onclick="register()">Register Secure User</button>
            <a href="login.html" class="btn btn-link px-0">Back to Login</a>
        </fieldset>
    </div>
</body>

<script>
    let currentConfig = { secureMode: false, mode: 'vulnerable' };

    window.onload = async function () {
        await loadConfig();
    };

    async function loadConfig() {
        const res = await fetch('/config');
        currentConfig = await res.json();
        applyMode(currentConfig);
    }

    function applyMode(config) {
        const badge = document.getElementById('modeBadge');
        const button = document.getElementById('modeToggleButton');
        const helpText = document.getElementById('registerHelpText');
        const registerButton = document.getElementById('registerButton');

        badge.textContent = config.secureMode ? 'Secure Mode' : 'Vulnerable Mode';
        badge.className = config.secureMode ? 'badge badge-success' : 'badge badge-error';
        button.textContent = config.secureMode ? 'Enable Vulnerable Mode' : 'Enable Secure Mode';
        helpText.textContent = config.secureMode
            ? 'Secure mode is active. Create a new account here, then return to the login page.'
            : 'Registration is disabled in vulnerable mode. Toggle secure mode on first.';
        registerButton.disabled = !config.secureMode;
    }

    async function toggleMode() {
        const res = await fetch('/toggle-mode', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                secureMode: !currentConfig.secureMode
            })
        });

        currentConfig = await res.json();
        applyMode(currentConfig);
        alert(`Mode switched to ${currentConfig.mode}`);
    }

    async function register() {
        const username = document.getElementById('registerUsername').value;
        const password = document.getElementById('registerPassword').value;

        const res = await fetch('/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                username,
                password
            })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
            alert(data.message || 'Registration failed');
            return;
        }

        alert(`Registered secure user ${data.username}. Redirecting to login.`);
        window.location.href = 'login.html';
    }
</script>

</html>
